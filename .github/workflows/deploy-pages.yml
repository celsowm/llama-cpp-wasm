name: Deploy playground to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  EMSDK_VERSION: "4.0.12"

jobs:
  build:
    name: Build playground
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install JavaScript dependencies
        run: npm install --no-audit --no-fund

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ninja-build

      - name: Install Emscripten SDK
        shell: bash
        run: |
          git clone --depth 1 \
            https://github.com/emscripten-core/emsdk.git \
            "${RUNNER_TEMP}/emsdk"

          "${RUNNER_TEMP}/emsdk/emsdk" install "${EMSDK_VERSION}"
          "${RUNNER_TEMP}/emsdk/emsdk" activate "${EMSDK_VERSION}"

          echo "EMSDK=${RUNNER_TEMP}/emsdk" >> "${GITHUB_ENV}"
          echo "${RUNNER_TEMP}/emsdk" >> "${GITHUB_PATH}"
          echo "${RUNNER_TEMP}/emsdk/upstream/emscripten" >> "${GITHUB_PATH}"

      - name: Fetch pinned llama.cpp
        run: npm run vendor:llama

      - name: Type-check library
        run: npm test

      - name: Build WASM runtime and playground
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build:pages

      - name: Verify Pages artifact
        shell: bash
        run: |
          test -f dist-demo/index.html
          test -f dist-demo/.nojekyll
          # The pthread build is the default; ST is a fallback when the host
          # is not cross-origin isolated.
          test -f dist-demo/wasm/llama-cpp-wasm-mt.js
          test -f dist-demo/wasm/llama-cpp-wasm-mt.wasm
          test -f dist-demo/wasm/llama-cpp-wasm-mt.worker.js
          test -f dist-demo/wasm/llama-cpp-wasm-st.js
          test -f dist-demo/wasm/llama-cpp-wasm-st.wasm

          if grep -R --line-number \
            -E '(["'\''])/wasm/llama-cpp-wasm(-mt|-st)?\.(js|wasm)' \
            dist-demo; then
            echo "Found a root-relative WASM URL that would break on project Pages." >&2
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist-demo

  deploy:
    name: Deploy playground
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
