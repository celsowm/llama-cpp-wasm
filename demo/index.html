<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>llama-cpp-wasm 0.0.3</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- Step 1: choose a model -->
    <div id="setup" class="screen">
      <div class="setup-card">
        <p class="eyebrow">llama-cpp-wasm</p>
        <h1>Chat with a local model</h1>
        <p class="subtitle">
          Everything runs in your browser with WebAssembly SIMD. Your prompts
          and the model never leave this device.
        </p>

        <label class="field">
          <span>Model</span>
          <select id="modelSelect">
            <option value="LFM25_230M_Q4_K_M">LFM2.5 230M (Q4_K_M) &middot; ~153 MB</option>
            <option value="LFM25_1_2B_INSTRUCT_Q4_K_M">LFM2.5 1.2B Instruct (Q4_K_M) &middot; ~731 MB</option>
            <option value="GEMMA4_E2B_IT_Q4_0">Gemma 4 E2B IT (Q4_0, vision) &middot; ~4.3 GB</option>
            <option value="custom">Your own GGUF file…</option>
          </select>
        </label>

        <div id="customModelField" class="field hidden">
          <span>GGUF file</span>
          <input id="model" type="file" accept=".gguf" />
        </div>

        <details class="advanced">
          <summary>Advanced options</summary>
          <div class="grid">
            <label>
              Context
              <input id="context" type="number" value="2048" min="128" step="128" />
            </label>
            <label>
              Batch
              <input id="batch" type="number" value="256" min="1" step="1" />
            </label>
          </div>
        </details>

        <button id="loadLfm" class="primary" type="button">Load model</button>

        <progress id="progress" value="0" max="1"></progress>
        <p id="status">Choose a model to start.</p>
      </div>
    </div>

    <!-- Step 2: ChatGPT-style chat -->
    <div id="chat" class="screen hidden">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-top">
          <button id="sidebarToggle" class="icon-btn" type="button" title="Collapse sidebar" aria-label="Collapse sidebar">
            &lsaquo;
          </button>
          <button id="newChatTop" class="new-chat" type="button">
            <span class="plus">+</span> New chat
          </button>
        </div>

        <div class="conversations" id="conversations"></div>

        <div class="sidebar-bottom">
          <button id="openSetup" class="ghost-btn" type="button">Change model</button>
        </div>
      </aside>

      <div class="chat-main">
        <header class="chat-header">
          <button id="sidebarReopen" class="icon-btn hidden" type="button" title="Open sidebar" aria-label="Open sidebar">
            &rsaquo;
          </button>
          <div class="chat-title">
            <strong id="modelLabel">Model</strong>
            <span id="chatStatus" class="chat-status">Ready</span>
          </div>
          <div class="chat-actions">
            <button id="newChat" type="button">New chat</button>
            <button id="unload" type="button">Unload</button>
          </div>
        </header>

        <div id="messages" class="messages"></div>

        <form id="composer" class="composer">
          <textarea id="prompt" rows="1" placeholder="Send a message…  (Enter to send, Shift+Enter for newline)"></textarea>
          <label id="attachLabel" class="attach" title="Attach an image">
            <input id="attach" type="file" accept="image/*" hidden />
            <span>📎</span>
          </label>
          <button type="submit" id="send">Send</button>
          <button type="button" id="cancel" class="hidden">Stop</button>
        </form>
      </div>
    </div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
