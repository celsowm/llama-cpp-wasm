<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>llama-cpp-wasm 0.0.3</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- Step 1: choose and load a model -->
    <section id="setup" class="screen">
      <div class="setup-card">
        <p class="eyebrow">llama-cpp-wasm</p>
        <h1>Chat with a local model</h1>
        <p class="subtitle">
          Everything runs in your browser with WebAssembly SIMD. Your prompts
          and the model never leave this device.
        </p>

        <div class="model-options">
          <button id="loadLfm" class="model-card" type="button">
            <span class="model-name">LFM2.5 230M (Q4_K_M)</span>
            <span class="model-meta">~153 MB &middot; chat-tuned &middot; recommended</span>
          </button>

          <label class="model-card file-card">
            <input id="model" type="file" accept=".gguf" hidden />
            <span class="model-name">Load your own GGUF</span>
            <span class="model-meta">Pick a small quantized GGUF file</span>
          </label>
        </div>

        <details class="advanced">
          <summary>Advanced options</summary>
          <div class="grid">
            <label>
              Context
              <input id="context" type="number" value="2048" min="128" step="128" />
            </label>
            <label>
              Batch
              <input id="batch" type="number" value="256" min="1" step="1" />
            </label>
          </div>
        </details>

        <progress id="progress" value="0" max="1"></progress>
        <p id="status">Choose a model to start.</p>
      </div>
    </section>

    <!-- Step 2: chat -->
    <section id="chat" class="screen hidden">
      <header class="chat-header">
        <div class="chat-title">
          <strong id="modelLabel">Model</strong>
          <span id="chatStatus" class="chat-status">Ready</span>
        </div>
        <div class="chat-actions">
          <button id="newChat" type="button">New chat</button>
          <button id="unload" type="button">Unload</button>
        </div>
      </header>

      <div id="messages" class="messages"></div>

      <form id="composer" class="composer">
        <textarea id="prompt" rows="1" placeholder="Send a message…  (Enter to send, Shift+Enter for newline)"></textarea>
        <button type="submit" id="send">Send</button>
        <button type="button" id="cancel" class="hidden">Stop</button>
      </form>
    </section>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
